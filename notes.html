<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Конспекты</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container"> 

  <header class="note" style="margin-top:20px; margin-bottom: 20px;">
    <h1>📚 Конспекты</h1>
    <div class="search-container" style="display: flex; flex-direction: column; gap: 15px;">
      <a href="index.html" class="back-link">← На главную</a>
      <a href="test-ege-informatika.html" class="back-link" style="border-color: rgba(59, 130, 246, 0.35); color: #93c5fd;">Тестирование: ЕГЭ по информатике →</a>
    </div>
  </header>

  <section class="note" style="margin-bottom: 20px;">
    <input
      id="search"
      placeholder="Поиск по конспектам..."
      autocomplete="off"
      class="search-input"
    >
  </section>

  <div id="notes"></div>

</div>

<footer>
  <div class="container">
    © <span id="year"></span> Овсиенко Алексей
  </div>
</footer>

<!-- notes-catalog.js: тот же каталог, что в notes.json; при file:// fetch к .json блокируется, а подключение .js — нет -->
<script src="notes-catalog.js"></script>
<script>
/* ===== ГОД ===== */
document.getElementById('year').textContent = new Date().getFullYear();

let allNotes = {};

/* ===== ЗАГРУЗКА каталога: сначала notes-catalog.js (в т.ч. file://), иначе fetch notes.json по HTTP ===== */
const NOTES_JSON_URL = new URL('notes.json', window.location.href).href;

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showNotesLoadError(err, extraUrlLine) {
  console.error('Ошибка загрузки:', err);
  const urlLine = extraUrlLine
    ? `Запрос: <code style="word-break:break-all;">${escapeHtml(extraUrlLine)}</code>`
    : '';
  let hint;
  if (err instanceof SyntaxError) {
    hint = 'Данные каталога не корректный JSON — проверьте <b>notes.json</b> / <b>notes-catalog.js</b>.';
  } else if (window.location.protocol === 'file:') {
    hint = 'Рядом с <b>notes.html</b> должен лежать <b>notes-catalog.js</b> (как сейчас). Если открываете по <b>file://</b>, не отключайте скрипты и не переименовывайте файл.';
  } else {
    hint = 'Убедитесь, что на сервере есть <b>notes-catalog.js</b> или <b>notes.json</b> в той же папке, что и <b>notes.html</b>.';
  }
  document.getElementById('notes').innerHTML = `
      <p class="note" style="color:#e3342f;text-align:center;">
        Ошибка загрузки конспектов.<br>
        ${urlLine ? urlLine + '<br>' : ''}
        <span style="font-size:14px;color:var(--text-muted);display:inline-block;margin-top:10px;text-align:left;max-width:42rem;">${hint}</span>
      </p>
    `;
}

function applyNotesData(data) {
  allNotes = data;
  renderNotes(data);
}

if (typeof window.__NOTES_CATALOG__ === 'object' && window.__NOTES_CATALOG__ !== null) {
  try {
    applyNotesData(window.__NOTES_CATALOG__);
  } catch (e) {
    showNotesLoadError(e, null);
  }
} else {
  fetch(NOTES_JSON_URL)
    .then(response => {
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }
      return response.json();
    })
    .then(data => {
      applyNotesData(data);
    })
    .catch(err => {
      showNotesLoadError(err, NOTES_JSON_URL);
    });
}

/* ===== ОТОБРАЖЕНИЕ ===== */
function renderNotes(data) {
  const container = document.getElementById('notes');
  container.innerHTML = '';

  let hasAny = false;

  for (const section in data) {
    if (
      !Object.prototype.hasOwnProperty.call(data, section) ||
      !Array.isArray(data[section]) ||
      data[section].length === 0
    ) continue;

    hasAny = true;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.innerHTML = `<h2>${section}</h2>`;

    const grid = document.createElement('div');
    grid.className = 'notes-grid';

    data[section].forEach(note => {
      if (!note || !note.title || !note.file) return;

      const card = document.createElement('div');
      card.className = 'note-item-wrapper note';

      card.innerHTML = `
        <a href="${note.file}" class="note-link">
          📄 ${note.title}
        </a>
      `;

      grid.appendChild(card);
    });

    sectionEl.appendChild(grid);
    container.appendChild(sectionEl);
  }

  if (!hasAny) {
    container.innerHTML = `
      <p class="note" style="text-align:center;">
        Конспекты не найдены
      </p>
    `;
  }
}

/* ===== ПОИСК ===== */
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  const filtered = {};

  for (const section in allNotes) {
    if (!Object.prototype.hasOwnProperty.call(allNotes, section)) continue;

    filtered[section] = allNotes[section].filter(note =>
      note.title.toLowerCase().includes(q)
    );
  }

  renderNotes(filtered);
});
</script>

</body>
</html>
